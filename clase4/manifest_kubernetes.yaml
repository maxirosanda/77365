apiVersion: apps/v1
kind: Deployment
metadata:
  name: mi-app-deployment
spec:
  replicas: 4
  selector:
    matchLabels:
      app: mi-app
  template:
    metadata:
      labels:
        app: mi-app
    spec:
      containers:
        - name: mi-app-container
          image: maxirosanda/ejemplo_docker_con_orquestacion:latest
          imagePullPolicy: Always
          ports:
            - name: http-port
              containerPort: 8080
          env:
            - name: PORT
              value: "8080"

---

apiVersion: v1
kind: Service
metadata:
  name: mi-app-service
spec:
  type: NodePort
  selector:
    app: mi-app
  ports:
    - name: http-port
      protocol: TCP
      port: 8000
      targetPort: 8080
      nodePort: 30081